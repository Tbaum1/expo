workflows:
  android-aab:
    name: Loot Hollow Android AAB (signed)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      android_signing:
        - loothollow_upload
      node: v22.13.1
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
        - pattern: main
          include: true
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Generate Android project
        script: |
          npx expo prebuild --platform android
      - name: Set Android SDK location
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/android/local.properties"
      - name: Build signed Android App Bundle (release)
        script: |
          cd android
          ./gradlew bundleRelease \
            --init-script "$CM_BUILD_DIR/ci-no-sonatype.init.gradle" \
            --stacktrace \
            -Pandroid.injected.signing.store.file="$CM_KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password="$CM_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$CM_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$CM_KEY_PASSWORD"
    artifacts:
      - android/app/build/outputs/**/*.aab
    publishing:
      email:
        recipients:
          - anthony.tennenbaum@yahoo.com
        notify:
          success: true
          failure: true

  ios-appstore:
    name: Loot Hollow iOS (App Store)
    max_build_duration: 90
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: LootHollow_ASC
    environment:
      node: v22.13.1
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.loothollow.app"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
        - pattern: main
          include: true
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Generate iOS native project (Expo prebuild)
        script: |
          npx expo prebuild --platform ios --no-install
      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install
      - name: Set up code signing (create cert + profile if missing)
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build signed iOS app (.ipa)
        script: |
          SCHEME=$(basename ios/*.xcworkspace .xcworkspace)
          echo "Building scheme: $SCHEME"
          xcode-project build-ipa \
            --workspace "ios/$SCHEME.xcworkspace" \
            --scheme "$SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - anthony.tennenbaum@yahoo.com
        notify:
          success: true
          failure: true
